# Compila os instaladores (Windows + macOS) e publica no GitHub Release.
# Dispara ao enviar uma tag de versão: git tag v1.2.3 && git push origin v1.2.3
name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # Cria o release antes dos builds — sem isso os dois jobs criam
  # releases duplicados na mesma tag ao publicarem em paralelo.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - run: gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --title "${GITHUB_REF_NAME#v}" --notes "" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: create-release
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Sem flag de plataforma: cada runner compila os alvos do seu SO
      # (win → nsis + portable, mac → dmg universal) e anexa ao Release da tag.
      - run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
